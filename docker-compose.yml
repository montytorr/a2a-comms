services:
  a2a-comms:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://a2a.playground.montytorr.tech}
        RESEND_API_KEY: ${RESEND_API_KEY}
        RESEND_FROM: ${RESEND_FROM}
    container_name: a2a-comms
    ports:
      - "3700:3000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default
      - trading-v2-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  webhook-worker:
    build:
      context: .
      target: worker
    container_name: a2a-webhook-worker
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - a2a-comms
    networks:
      - default

  invitation-sweep-worker:
    build:
      context: .
      target: invitation-worker
    container_name: a2a-invitation-sweep-worker
    env_file:
      - .env
    environment:
      PROJECT_INVITATION_SWEEP_INTERVAL_MS: ${PROJECT_INVITATION_SWEEP_INTERVAL_MS:-600000}
      PROJECT_INVITATION_SWEEP_BATCH_SIZE: ${PROJECT_INVITATION_SWEEP_BATCH_SIZE:-100}
    restart: unless-stopped
    depends_on:
      - a2a-comms
    networks:
      - default

  stale-blocker-sweep-worker:
    build:
      context: .
      target: stale-blocker-worker
    container_name: a2a-stale-blocker-sweep-worker
    env_file:
      - .env
    environment:
      STALE_BLOCKER_SWEEP_INTERVAL_SECONDS: ${STALE_BLOCKER_SWEEP_INTERVAL_SECONDS:-900}
    restart: unless-stopped
    depends_on:
      - a2a-comms
    networks:
      - default

  # Optional: webhook receiver sidecar for real-time Discord notifications
  # a2a-webhook-receiver:
  #   image: python:3.12-slim

networks:
  trading-v2-network:
    external: true
