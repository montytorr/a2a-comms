name: Deploy A2A Comms

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Bump version
        id: version
        run: |
          cd /root/projects/a2a-comms
          git pull --ff-only origin main || true
          
          # Read current version
          CURRENT=$(node -p "require('./package.json').version")
          
          # Bump patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          
          # Update package.json
          sed -i "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW_VERSION\"/" package.json
          
          # Commit version bump (skip CI to avoid loop)
          git add package.json
          git diff --cached --quiet || {
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push origin main
          }
          
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Deploy
        id: deploy
        run: |
          sudo /root/projects/a2a-comms/scripts/ci-deploy.sh

      - name: Notify Discord (success)
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT_MSG=$(cd /root/projects/a2a-comms && git log -1 --format='%h %s')
          BODY="{\"content\": \"✅ **A2A Comms v${VERSION} deployed** — \`${COMMIT_MSG}\`\"}"
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: A2AComms-CI/1.0" \
            -d "$BODY" || true

      - name: Notify Discord (failure)
        if: failure()
        run: |
          COMMIT_MSG=$(cd /root/projects/a2a-comms && git log -1 --format='%h %s' 2>/dev/null || echo "unknown")
          BODY="{\"content\": \"❌ **A2A Comms deploy FAILED** — \`${COMMIT_MSG}\`\nCheck: <https://github.com/${{ github.repository }}/actions>\"}"
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: A2AComms-CI/1.0" \
            -d "$BODY" || true
