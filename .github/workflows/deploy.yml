name: Deploy A2A Comms

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  lint-and-build:
    runs-on: self-hosted
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Pull latest
        run: |
          cd /root/projects/a2a-comms
          git pull origin main

      - name: Clean .next cache
        run: |
          cd /root/projects/a2a-comms
          sudo chown -R runner:runner .next 2>/dev/null || true
          rm -rf .next node_modules/.cache

      - name: Lint
        run: |
          cd /root/projects/a2a-comms
          corepack pnpm exec eslint .

      - name: Build
        run: |
          cd /root/projects/a2a-comms
          corepack pnpm exec next build

  deploy:
    needs: lint-and-build
    runs-on: self-hosted
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Capture commit info
        id: commit
        run: |
          COMMIT_MSG=$(cd /root/projects/a2a-comms && git log -1 --format='%h %s')
          echo "msg=$COMMIT_MSG" >> "$GITHUB_OUTPUT"

      - name: Deploy
        id: deploy
        run: |
          VERSION=$(sudo /root/projects/a2a-comms/scripts/ci-deploy.sh | tail -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Clean .next after deploy
        if: always()
        run: |
          cd /root/projects/a2a-comms
          sudo chown -R runner:runner .next 2>/dev/null || true
          rm -rf .next node_modules/.cache

      - name: Notify Discord (success)
        if: success()
        run: |
          VERSION="${{ steps.deploy.outputs.version }}"
          COMMIT_MSG="${{ steps.commit.outputs.msg }}"
          BODY="{\"content\": \"✅ **A2A Comms v${VERSION} deployed** — \`${COMMIT_MSG}\`\"}"
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: A2AComms-CI/1.0" \
            -d "$BODY" || true

      - name: Notify Discord (deploy failure)
        if: failure()
        run: |
          COMMIT_MSG=$(cd /root/projects/a2a-comms && git log -1 --format='%h %s' 2>/dev/null || echo "unknown")
          BODY="{\"content\": \"❌ **A2A Comms deploy FAILED** — \`${COMMIT_MSG}\`\nCheck: <https://github.com/${{ github.repository }}/actions>\"}"
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: A2AComms-CI/1.0" \
            -d "$BODY" || true

  notify-ci-failure:
    needs: lint-and-build
    runs-on: self-hosted
    if: failure()
    steps:
      - name: Notify Discord (CI failure)
        run: |
          COMMIT_MSG=$(cd /root/projects/a2a-comms && git log -1 --format='%h %s' 2>/dev/null || echo "unknown")
          BODY="{\"content\": \"❌ **A2A Comms CI failed** (lint/build) — \`${COMMIT_MSG}\`\nCheck: <https://github.com/${{ github.repository }}/actions>\"}"
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: A2AComms-CI/1.0" \
            -d "$BODY" || true
